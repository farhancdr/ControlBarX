name: Build and Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Release
        run: |
          xcodebuild -scheme ControlBarX \
            -configuration Release \
            -project ControlBarX.xcodeproj \
            -derivedDataPath build \
            build

      - name: Ad-hoc sign
        run: codesign --force --deep -s - build/Build/Products/Release/ControlBarX.app

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R build/Build/Products/Release/ControlBarX.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "ControlBarX" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            ControlBarX.dmg

      - name: Generate version tag
        id: version
        run: |
          TAG="v1.0.$(git rev-list --count HEAD)-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Delete existing release if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ steps.version.outputs.tag }}" --yes 2>/dev/null || true

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" ControlBarX.dmg \
            --title "ControlBarX $TAG" \
            --notes "Automated release from commit $(git rev-parse --short HEAD)" \
            --latest
